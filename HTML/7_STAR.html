<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Galaxy Text</title>
<style>
body{
  margin:0;
  overflow:hidden;
  background:black;
}
canvas{
  position:absolute;
  top:0;
  left:0;
}
input{
  position:fixed;
  bottom:30px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 25px;
  background:#111;
  border:1px solid #555;
  color:white;
  outline:none;
}
</style>
</head>
<body>

<canvas id="canvas"></canvas>
<input type="text" id="textInput" placeholder="Type anything...">

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const textInput = document.getElementById("textInput");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const STAR_COUNT = 2500;  
let particles = [];
let forming = false;

class Star{
  constructor(){
    this.reset();
    this.size = Math.random()*1.5 + 0.5;
  }

  reset(){
    this.x = Math.random()*canvas.width;
    this.y = Math.random()*canvas.height;
    this.tx = this.x;
    this.ty = this.y;
  }

  update(){
    this.x += (this.tx - this.x)*0.07;
    this.y += (this.ty - this.y)*0.07;
  }

  draw(){
    ctx.beginPath();
    ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
    ctx.fillStyle="white";
    ctx.fill();
  }
}

function init(){
  particles=[];
  for(let i=0;i<STAR_COUNT;i++){
    particles.push(new Star());
  }
}

function wrapLines(context, text, maxWidth){
  const words = text.split(/\s+/).filter(Boolean);
  if(words.length === 0) return [""];

  const lines = [];
  let current = words[0];

  for(let i=1;i<words.length;i++){
    const candidate = `${current} ${words[i]}`;
    if(context.measureText(candidate).width <= maxWidth){
      current = candidate;
    }else{
      lines.push(current);
      current = words[i];
    }
  }

  lines.push(current);
  return lines;
}

function formText(str){
  forming = true;

  const off = document.createElement("canvas");
  const offCtx = off.getContext("2d");

  off.width = canvas.width;
  off.height = canvas.height;

  const cleanText = str.trim();
  const maxTextWidth = off.width * 0.82;
  const maxTextHeight = off.height * 0.5;
  let fontSize = Math.min(off.width * 0.18, off.height * 0.24, 180);
  let lines = [cleanText];

  offCtx.fillStyle="white";
  offCtx.textAlign="center";
  offCtx.textBaseline="middle";

  while(fontSize >= 28){
    offCtx.font=`bold ${fontSize}px Arial`;
    lines = wrapLines(offCtx, cleanText, maxTextWidth);

    const lineHeight = fontSize * 1.12;
    const blockHeight = lines.length * lineHeight;
    const widestLine = Math.max(...lines.map(line => offCtx.measureText(line).width));

    if(blockHeight <= maxTextHeight && widestLine <= maxTextWidth && lines.length <= 5){
      break;
    }
    fontSize -= 4;
  }

  offCtx.font=`bold ${fontSize}px Arial`;
  const drawLineHeight = fontSize * 1.12;
  const textBlockHeight = lines.length * drawLineHeight;
  let startY = off.height / 2 - textBlockHeight / 2 + drawLineHeight / 2;

  lines.forEach((line, i)=>{
    offCtx.fillText(line, off.width / 2, startY + i * drawLineHeight);
  });

  const data = offCtx.getImageData(0,0,off.width,off.height).data;

  let points = [];
  const sampleStep = cleanText.length > 28 ? 4 : 5;

  for(let y=0;y<off.height;y+=sampleStep){
    for(let x=0;x<off.width;x+=sampleStep){
      const index=(y*off.width+x)*4;
      if(data[index+3]>150){
        points.push({x,y});
      }
    }
  }

  for(let i=0;i<particles.length;i++){
    if(points.length > 0){
      const idx = Math.floor(i * points.length / particles.length);
      const target = points[Math.min(idx, points.length - 1)];
      particles[i].tx = target.x;
      particles[i].ty = target.y;
    }else{
      particles[i].tx = Math.random()*canvas.width;
      particles[i].ty = Math.random()*canvas.height;
    }
  }
}

function scatter(){
  forming = false;
  particles.forEach(p=>{
    p.tx = Math.random()*canvas.width;
    p.ty = Math.random()*canvas.height;
  });
}

function animate(){
  ctx.fillStyle="rgba(0,0,0,0.35)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  particles.forEach(p=>{
    p.update();
    p.draw();
  });

  requestAnimationFrame(animate);
}

init();
animate();

textInput.addEventListener("input",(e)=>{
  if(e.target.value.trim()===""){
    scatter();
  }else{
    formText(e.target.value);
  }
});

window.addEventListener("resize", ()=>{
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  init();

  if(textInput.value.trim()===""){
    scatter();
  }else{
    formText(textInput.value);
  }
});
</script>

</body>
</html>
