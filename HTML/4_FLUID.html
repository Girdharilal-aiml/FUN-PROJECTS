<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra Satisfying Cosmic Nebula</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020205;
            font-family: 'Inter', sans-serif;
        }
        canvas {
            display: block;
        }
        #ui-overlay {
            position: absolute;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            text-align: center;
            pointer-events: none;
            z-index: 10;
            width: 100%;
        }
        .nebula-text {
            background: linear-gradient(to right, #00f2fe, #7117ea, #ea6227, #f0ff00);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient-flow 5s linear infinite;
            font-weight: 900;
            letter-spacing: -2px;
        }
        @keyframes gradient-flow {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }
        .instruction {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 4px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <h1 class="text-6xl md:text-8xl nebula-text">COSMIC FLUID</h1>
        <p class="instruction">Tap or Click to trigger Supernova</p>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        /**
         * Ultra-Satisfying Fluid Particle System
         * Features: Additive Blending, Velocity Smoothing, Supernova Burst
         */

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let particlesArray = [];
        let spots = [];
        let hue = 0;

        const mouse = {
            x: undefined,
            y: undefined,
            radius: 150
        }

        window.addEventListener('resize', function() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        window.addEventListener('mousemove', function(event) {
            mouse.x = event.x;
            mouse.y = event.y;
            // Mouse move se bhi thode particles create hote hain
            for (let i = 0; i < 2; i++) {
                spots.push(new Particle());
            }
        });

        // Supernova Burst on Click
        window.addEventListener('mousedown', function(event) {
            for (let i = 0; i < 30; i++) {
                spots.push(new Particle());
            }
        });

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        

        

    </script>
</body>
</html>
